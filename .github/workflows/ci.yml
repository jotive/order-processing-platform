name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format check
        run: ruff format --check app tests

      - name: Type check (mypy)
        run: mypy app || true  # non-blocking until types are tightened

      - name: Unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret
        run: pytest tests/unit -v

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opp
          POSTGRES_PASSWORD: opp
          POSTGRES_DB: opp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U opp -d opp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://opp:opp@localhost:5432/opp_test
          DATABASE_URL: postgresql+asyncpg://opp:opp@localhost:5432/opp_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret
        run: pytest tests/integration -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: order-processing-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
